name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: python3 -m pip install --upgrade pip poetry
      - name: Install Python dependencies
        run: |
          poetry install --with dev --extras http2 --no-root
      - name: Run Python quality gate
        run: make poetry-quality-python

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run Rust quality gate
        run: make quality-rust
