name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests
      - name: Run Python quality gate
        run: make quality-python

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run Rust quality gate
        run: make quality-rust

  rust-package-linux-amd64:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - python-quality
      - rust-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Linux amd64 Rust release package
        run: make build-rust-linux-amd64
      - name: Upload Linux amd64 Rust release package
        uses: actions/upload-artifact@v6
        with:
          name: rust-linux-amd64-${{ github.ref_name }}
          path: dist/linux-amd64/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  rust-package-macos-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - python-quality
      - rust-quality
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS arm64 Rust release package
        run: make build-rust-macos-arm64
      - name: Upload macOS arm64 Rust release package
        uses: actions/upload-artifact@v6
        with:
          name: rust-macos-arm64-${{ github.ref_name }}
          path: dist/macos-arm64/*.tar.gz
          if-no-files-found: error
          retention-days: 30
